<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL to QR Code Maker</title>
    <link rel="stylesheet" href="https://unpkg.com/purecss@2.0.3/build/pure-min.css" />
    <link rel="stylesheet" href="../src/css/Style.css">
</head>

<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <!-- QR Code Generator Interface -->
    <div class="url-input-container">
        <input type="text" id="urlInput" placeholder="Paste URL here..." />
        <button onclick="generateQRCode()">Generate</button>
    </div>
    
    <div id="qrcode"></div>
    
    <script>
        // Default URL
        const defaultURL = "https://www.youtube.com/playlist?list=PLeowZcBbLxmLxCNYHz7bOl90xy_gNkzSx";
        
        // Set default value in input
        document.getElementById("urlInput").value = defaultURL;
        
        // Generate QR code function
        function generateQRCode() {
            const url = document.getElementById("urlInput").value || defaultURL;
            const container = document.getElementById("qrcode");
            container.innerHTML = ""; // Clear previous QR code
            new QRCode(container, {
                text: url,
                width: 256,
                height: 256
            });
        }
        
        // Generate default QR code on page load
        window.onload = generateQRCode;
    </script>
</body>
