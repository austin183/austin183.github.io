<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>URL to QR Code Maker</title>
        <link rel="stylesheet" href="https://unpkg.com/purecss@2.0.3/build/pure-min.css" />
        <link rel="stylesheet" href="../src/css/Style.css">
    </head>

<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <!-- QR Code Generator Interface -->
    <div class="url-input-container">
        <input type="text" id="urlInput" placeholder="Paste URL here..." />
        <button onclick="generateQRCode()">Generate</button>
        <button id="copyButton" onclick="copyQRCodeToClipboard()" style="display: none; margin-top: 10px;">Copy QR Code</button>
    </div>
    
    <div id="qrcode"></div>
    
    <script>
        // Default URL
        const defaultURL = "https://www.youtube.com/playlist?list=PLeowZcBbLxmLxCNYHz7bOl90xy_gNkzSx";
        
        // Set default value in input
        document.getElementById("urlInput").value = defaultURL;
        
        // Generate QR code function
        async function generateQRCode() {
            const url = document.getElementById("urlInput").value || defaultURL;
            const container = document.getElementById("qrcode");
            container.innerHTML = ""; // Clear previous QR code
            new QRCode(container, {
                text: url,
                width: 256,
                height: 256
            });
            
            // Show copy button once QR code is generated
            document.getElementById("copyButton").style.display = "inline-block";
        }
        
        // Check if we're on a mobile device
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        
        // Copy QR code to clipboard
        async function copyQRCodeToClipboard() {
            const container = document.getElementById("qrcode");
            const imgElement = container.querySelector("img") || container.querySelector("canvas");
            
            if (!imgElement) {
                notifyCopyStatus(false, "No QR code found");
                return;
            }
            
            // On mobile, show the image for user to save (clipboard API limitations)
            if (isMobileDevice()) {
                showImageForSaving(imgElement);
                return;
            }
            
            try {
                // Get the image data
                let blob;
                if (imgElement.tagName === "IMG") {
                    const response = await fetch(imgElement.src);
                    blob = await response.blob();
                } else {
                    // It's a canvas
                    const dataUrl = imgElement.toDataURL("image/png");
                    const response = await fetch(dataUrl);
                    blob = await response.blob();
                }
                
                // Copy to clipboard
                await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                notifyCopyStatus(true, "QR Code image copied to clipboard!");
            } catch (error) {
                console.error("Failed to copy QR code:", error);
                // Fallback: show image for saving
                showImageForSaving(imgElement);
            }
        }
        
        // Show QR code image in a modal for mobile users to save
        function showImageForSaving(imgElement) {
            // Get the image source
            let imageUrl;
            if (imgElement.tagName === "IMG") {
                imageUrl = imgElement.src;
            } else {
                imageUrl = imgElement.toDataURL("image/png");
            }
            
            // Create modal overlay
            const overlay = document.createElement("div");
            overlay.id = "qrOverlay";
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.85);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            `;
            
            // Instruction text
            const instructions = document.createElement("p");
            instructions.style.cssText = `
                color: white;
                font-size: 16px;
                text-align: center;
                margin-bottom: 20px;
                padding: 0 20px;
            `;
            instructions.textContent = "Long-press and hold on the image to save it to your photos";
            
            // The QR code image
            const fullImage = document.createElement("img");
            fullImage.src = imageUrl;
            fullImage.alt = "QR Code";
            fullImage.style.cssText = `
                max-width: 90%;
                max-height: 70vh;
                border-radius: 8px;
                pointer-events: auto;
                user-select: none;
                outline: 2px solid white;
                outline-offset: -2px;
                cursor: pointer;
            `;
            
            // Close button
            const closeButton = document.createElement("button");
            closeButton.textContent = "Close";
            closeButton.style.cssText = `
                margin-top: 20px;
                padding: 12px 24px;
                font-size: 16px;
                background: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            `;
            closeButton.onclick = () => overlay.remove();
            
            // Add click-to-close on overlay background
            overlay.onclick = (e) => {
                if (e.target === overlay) {
                    overlay.remove();
                }
            };
            
            // Assemble modal
            overlay.appendChild(instructions);
            overlay.appendChild(fullImage);
            overlay.appendChild(closeButton);
            document.body.appendChild(overlay);
        }
        
        // Show notification
        function notifyCopyStatus(success, message) {
            const notification = document.createElement("div");
            notification.id = "copyNotification";
            notification.className = success ? "notification success" : "notification error";
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Auto-remove after 2 seconds
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }
        
        // Generate default QR code on page load
        window.onload = generateQRCode;
    </script>
</body>
